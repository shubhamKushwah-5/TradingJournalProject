spring.application.name=journal-api
# Database connection
# Default to dev profile
spring.profiles.active=dev
spring.datasource.url=jdbc:mysql://localhost:3306/trading_journal_db
spring.datasource.username=root
spring.datasource.password=root123

# JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGenerationPleaseChangeThisInProduction
jwt.expiration=86400000

# File upload settings
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Upload directory
file.upload-dir=C:/WORK/java project/DAILY/uploads





